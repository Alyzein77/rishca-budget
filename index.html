// ── LOGIN ─────────────────────────────────────────────────────
function Login(props){
  var pw = useState("");
  var err = useState(false);
  function go(e){
    e.preventDefault();
    if(pw[0]==="rishca2026"){props.onLogin();}
    else{err[1](true);pw[1]("");}
  }
  return h("div",{className:"min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-700"},
    h("form",{onSubmit:go,className:"bg-white rounded-2xl shadow-2xl p-10 w-96 text-center"},
      h("div",{className:"text-4xl font-black text-slate-900 mb-1"},"Rishca OS"),
      h("div",{className:"text-slate-500 mb-8"},"Team Budget Manager"),
      err[0] && h("div",{className:"bg-red-50 text-red-600 text-sm p-2 rounded mb-4"},"Wrong password"),
      h("input",{type:"password",placeholder:"Enter password",value:pw[0],
        onChange:function(e){pw[1](e.target.value);err[1](false);},
        className:"w-full border border-slate-300 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:ring-2 focus:ring-teal-500"}),
      h("button",{type:"submit",className:"w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 rounded-lg transition"},"Sign In")
    )
  );
}

// ── DASHBOARD TAB ─────────────────────────────────────────────
function DashTab(props){
  var data = props.data;
  var fx = props.fx;
  var allTime = data.reduce(function(s,e){return s+e.amt;},0);
  var now = new Date();
  var curM = now.getMonth()+1, curY = now.getFullYear();
  var thisMonth = data.filter(function(e){return e.y===curY&&e.m===curM;}).reduce(function(s,e){return s+e.amt;},0);
  var months = {};
  data.forEach(function(e){var k=e.y+"-"+String(e.m).padStart(2,"0");months[k]=(months[k]||0)+e.amt;});
  var mKeys = Object.keys(months).sort();
  var avgBurn = mKeys.length?allTime/mKeys.length:0;
  var activeCount = team.filter(function(t){return t.active;}).length;

  var chartRef = useRef(null);
  var barRef = useRef(null);
  var lineInst = useRef(null);
  var barInst = useRef(null);

  useEffect(function(){
    if(lineInst.current)lineInst.current.destroy();
    if(chartRef.current){
      lineInst.current=new Chart(chartRef.current,{type:"line",data:{
        labels:mKeys.map(function(k){return MN[parseInt(k.split("-")[1])]+" "+k.split("-")[0].slice(2);}),
        datasets:[{label:"Monthly (EGP)",data:mKeys.map(function(k){return months[k];}),
          borderColor:"#0d9488",backgroundColor:"rgba(13,148,136,0.1)",tension:0.4,fill:true,pointRadius:5,pointBackgroundColor:"#0d9488"}]
      },options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
    }
    if(barInst.current)barInst.current.destroy();
    if(barRef.current){
      var ppl={};data.forEach(function(e){ppl[e.name]=(ppl[e.name]||0)+e.amt;});
      var names=Object.keys(ppl).sort(function(a,b){return ppl[b]-ppl[a];});
      barInst.current=new Chart(barRef.current,{type:"bar",data:{
        labels:names,datasets:[{label:"Total Earned (EGP)",data:names.map(function(n){return ppl[n];}),backgroundColor:"#0d9488",borderRadius:4}]
      },options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false}}}});
    }
    return function(){if(lineInst.current)lineInst.current.destroy();if(barInst.current)barInst.current.destroy();};
  },[data]);

  function kpi(label,egp){
    return h("div",{className:"bg-white rounded-xl shadow p-5 border border-slate-200"},
      h("div",{className:"text-sm text-slate-500"},label),
      h("div",{className:"text-2xl font-bold text-slate-900 mt-1"},fmtEGP(egp)),
      fx>0 && h("div",{className:"text-sm text-teal-600 mt-1"},fmtUSD(egp/fx))
    );
  }
  return h("div",{className:"fade-in"},
    h("div",{className:"grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6"},
      kpi("This Month",thisMonth),kpi("All Time",allTime),
      h("div",{className:"bg-white rounded-xl shadow p-5 border border-slate-200"},
        h("div",{className:"text-sm text-slate-500"},"Active Members"),
        h("div",{className:"text-2xl font-bold text-teal-600 mt-1"},activeCount)
      ),
      kpi("Avg Monthly Burn",avgBurn)
    ),
    fx>0 && h("div",{className:"bg-teal-50 border border-teal-200 rounded-xl p-4 mb-6 flex items-center justify-between"},
      h("span",{className:"text-teal-800 font-medium"},"Live FX Rate: 1 USD = "+fx.toFixed(2)+" EGP"),
      h("span",{className:"text-teal-600 text-sm"},"Source: ExchangeRate-API")
    ),
    h("div",{className:"grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6"},
      h("div",{className:"bg-white rounded-xl shadow p-5 border border-slate-200"},
        h("h3",{className:"font-bold text-slate-900 mb-3"},"Monthly Spend Trend"),
        h("canvas",{ref:chartRef})
      ),
      h("div",{className:"bg-white rounded-xl shadow p-5 border border-slate-200"},
        h("h3",{className:"font-bold text-slate-900 mb-3"},"Top Earners"),
        h("canvas",{ref:barRef})
      )
    )
  );
}

// ── TIME LOG TAB ──────────────────────────────────────────────
function LogTab(props){
  var data=props.data,setData=props.setData;
  var nameF=useState(""),monthF=useState(""),stF=useState("");
  var sortK=useState("id"),sortD=useState(1);

  var names=[]; data.forEach(function(e){if(names.indexOf(e.name)<0)names.push(e.name);});names.sort();
  var monthsSet=[]; data.forEach(function(e){var k=e.mn+" "+e.y;if(monthsSet.indexOf(k)<0)monthsSet.push(k);});

  var filtered=data.filter(function(e){
    if(nameF[0]&&e.name!==nameF[0])return false;
    if(monthF[0]&&(e.mn+" "+e.y)!==monthF[0])return false;
    if(stF[0]&&e.st!==stF[0])return false;
    return true;
  }).sort(function(a,b){
    var av=a[sortK[0]],bv=b[sortK[0]];
    return av<bv?-sortD[0]:av>bv?sortD[0]:0;
  });

  function thClick(k){if(sortK[0]===k)sortD[1](-sortD[0]);else{sortK[1](k);sortD[1](1);}}

  function sel(val,set,opts,placeholder){
    return h("select",{value:val,onChange:function(e){set(e.target.value);},
      className:"border border-slate-300 rounded px-3 py-2 text-sm"},
      h("option",{value:""},placeholder),
      opts.map(function(o){return h("option",{key:o,value:o},o);})
    );
  }

  function th(label,key){
    return h("th",{onClick:function(){thClick(key);},
      className:"px-3 py-2 text-left text-xs font-semibold text-slate-600 cursor-pointer hover:bg-slate-100 select-none"},
      label+(sortK[0]===key?(sortD[0]>0?" ▲":" ▼"):""));
  }

  return h("div",{className:"fade-in"},
    h("div",{className:"flex flex-wrap gap-3 mb-4"},
      sel(nameF[0],nameF[1],names,"All Members"),
      sel(monthF[0],monthF[1],monthsSet,"All Months"),
      sel(stF[0],stF[1],["T","O"],"All Status"),
      h("span",{className:"text-sm text-slate-500 self-center"},filtered.length+" entries")
    ),
    h("div",{className:"bg-white rounded-xl shadow border border-slate-200 overflow-x-auto"},
      h("table",{className:"w-full text-sm"},
        h("thead",null,h("tr",{className:"bg-slate-50 border-b border-slate-200"},
          th("#","id"),th("Year","y"),th("Month","mn"),th("Name","name"),
          th("Rate","rate"),th("Hours","hrs"),th("Amount","amt"),th("Status","st")
        )),
        h("tbody",null,filtered.map(function(e){
          return h("tr",{key:e.id,className:"border-b border-slate-100 hover:bg-slate-50"},
            h("td",{className:"px-3 py-2 text-slate-400"},e.id),
            h("td",{className:"px-3 py-2"},e.y),
            h("td",{className:"px-3 py-2"},e.mn),
            h("td",{className:"px-3 py-2 font-medium"},e.name),
            h("td",{className:"px-3 py-2"},e.rate?fmtEGP(e.rate):"-"),
            h("td",{className:"px-3 py-2"},e.hrs),
            h("td",{className:"px-3 py-2 font-semibold"},fmtEGP(e.amt)),
            h("td",{className:"px-3 py-2"},h("span",{className:"px-2 py-1 rounded text-xs font-medium "+stColor(e.st)},stLabel(e.st)))
          );
        }))
      )
    )
  );
}

// ── TEAM TAB ──────────────────────────────────────────────────
function TeamTab(props){
  return h("div",{className:"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 fade-in"},
    team.map(function(t){
      var hrs=0,earned=0;
      props.data.forEach(function(e){if(e.name===t.name){hrs+=e.hrs;earned+=e.amt;}});
      return h("div",{key:t.name,className:"bg-white rounded-xl shadow p-5 border border-slate-200"},
        h("div",{className:"flex items-center justify-between mb-3"},
          h("div",{className:"font-bold text-lg text-slate-900"},t.name),
          h("span",{className:t.active?"bg-teal-500 text-white text-xs px-2 py-1 rounded":"bg-slate-200 text-slate-500 text-xs px-2 py-1 rounded"},t.active?"Active":"Inactive")
        ),
        h("div",{className:"text-sm text-slate-600 space-y-1"},
          h("p",null,"Type: ",h("strong",null,t.type)),
          t.rate>0 && h("p",null,"Rate: ",h("strong",{className:"text-blue-600"},fmtEGP(t.rate)+"/hr")),
          t.salary>0 && h("p",null,"Salary: ",h("strong",{className:"text-blue-600"},fmtEGP(t.salary)+"/mo")),
          h("p",null,"Period: "+t.start+(t.end?" → "+t.end:" → Present")),
          h("p",{className:"mt-2 pt-2 border-t border-slate-100"},"Total: ",h("strong",{className:"text-teal-600"},fmtEGP(earned))," · ",Math.round(hrs)+" hrs")
        )
      );
    })
  );
}

// ── PAYMENTS TAB (NEW) ────────────────────────────────────────
function PayTab(props){
  var data=props.data,setData=props.setData,fx=props.fx;
  var curM=useState(2),curY=useState(2026);

  // Get entries for selected month
  var monthEntries=data.filter(function(e){return e.y===curY[0]&&e.m===curM[0];});

  // Group by person
  var byPerson={};
  monthEntries.forEach(function(e){
    if(!byPerson[e.name])byPerson[e.name]={entries:[],total:0,allTransferred:true};
    byPerson[e.name].entries.push(e);
    byPerson[e.name].total+=e.amt;
    if(e.st!=="T")byPerson[e.name].allTransferred=false;
  });

  // Add salaried employees who might not have entries
  team.forEach(function(t){
    if(t.salary>0 && !byPerson[t.name]){
      // Check if they've started by this month
      var startParts=t.start.split(" ");
      var startM=MN.indexOf(startParts[0]);
      var startY=parseInt(startParts[1]);
      if(curY[0]>startY||(curY[0]===startY&&curM[0]>=startM)){
        byPerson[t.name]={entries:[],total:t.salary,allTransferred:false,isSalaryOnly:true};
      }
    }
  });

  var grandTotal=Object.keys(byPerson).reduce(function(s,n){return s+byPerson[n].total;},0);
  var pendingTotal=Object.keys(byPerson).reduce(function(s,n){return s+(byPerson[n].allTransferred?0:byPerson[n].total);},0);

  function toggleStatus(personName){
    setData(data.map(function(e){
      if(e.name===personName&&e.y===curY[0]&&e.m===curM[0]){
        return Object.assign({},e,{st:e.st==="T"?"O":"T"});
      }
      return e;
    }));
  }

  function markAllTransferred(personName){
    setData(data.map(function(e){
      if(e.name===personName&&e.y===curY[0]&&e.m===curM[0]){
        return Object.assign({},e,{st:"T"});
      }
      return e;
    }));
  }

  var months=[];
  for(var mi=1;mi<=12;mi++)months.push(mi);

  return h("div",{className:"fade-in"},
    h("div",{className:"flex items-center gap-4 mb-6"},
      h("select",{value:curM[0],onChange:function(e){curM[1](parseInt(e.target.value));},
        className:"border border-slate-300 rounded-lg px-4 py-2 font-medium"},
        months.map(function(m){return h("option",{key:m,value:m},MN[m]);})),
      h("select",{value:curY[0],onChange:function(e){curY[1](parseInt(e.target.value));},
        className:"border border-slate-300 rounded-lg px-4 py-2 font-medium"},
        h("option",{value:2025},"2025"),h("option",{value:2026},"2026")),
      h("div",{className:"ml-auto text-right"},
        h("div",{className:"text-sm text-slate-500"},"Total to Pay"),
        h("div",{className:"text-2xl font-bold text-slate-900"},fmtEGP(grandTotal)),
        fx>0 && h("div",{className:"text-sm text-teal-600"},fmtUSD(grandTotal/fx))
      )
    ),
    pendingTotal>0 && h("div",{className:"bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-4"},
      h("span",{className:"font-semibold text-yellow-800"},"Pending: "+fmtEGP(pendingTotal)),
      fx>0 && h("span",{className:"text-yellow-600 ml-2"},"("+fmtUSD(pendingTotal/fx)+")")
    ),
    h("div",{className:"space-y-3"},
      Object.keys(byPerson).sort().map(function(name){
        var p=byPerson[name];
        var member=team.find(function(t){return t.name===name;});
        return h("div",{key:name,className:"bg-white rounded-xl shadow border border-slate-200 p-5 flex items-center justify-between"},
          h("div",null,
            h("div",{className:"font-bold text-lg text-slate-900"},name),
            h("div",{className:"text-sm text-slate-500"},
              member?member.type:"",
              p.entries.length>0?" · "+p.entries.reduce(function(s,e){return s+e.hrs;},0).toFixed(1)+" hrs":"",
              member&&member.rate>0?" @ "+fmtEGP(member.rate)+"/hr":""
            )
          ),
          h("div",{className:"flex items-center gap-4"},
            h("div",{className:"text-right"},
              h("div",{className:"text-xl font-bold text-slate-900"},fmtEGP(p.total)),
              fx>0 && h("div",{className:"text-sm text-teal-600"},fmtUSD(p.total/fx))
            ),
            h("button",{onClick:function(){markAllTransferred(name);},
              className:p.allTransferred
                ?"bg-green-100 text-green-700 px-4 py-2 rounded-lg font-medium text-sm cursor-default"
                :"bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition cursor-pointer"},
              p.allTransferred?"✓ Paid":"Mark Paid"
            )
          )
        );
      })
    )
  );
}

// ── SCENARIOS TAB ─────────────────────────────────────────────
function ScenTab(){
  var hc=useState(11),rateAdj=useState(0),burnAdj=useState(0);
  var baseBurn=50000;
  var projected=baseBurn*(1+burnAdj[0]/100)*(hc[0]/11)*(1+rateAdj[0]/100);
  var annual=projected*12;
  var revenue=48798.5;
  var profit=revenue-projected*12/12;

  function slider(label,val,set,min,max,unit){
    return h("div",{className:"mb-6"},
      h("div",{className:"flex justify-between mb-2"},
        h("span",{className:"text-sm font-medium text-slate-700"},label),
        h("span",{className:"text-sm font-bold text-teal-600"},val+unit)
      ),
      h("input",{type:"range",min:min,max:max,value:val,
        onChange:function(e){set(parseInt(e.target.value));},
        className:"w-full accent-teal-600"})
    );
  }
  return h("div",{className:"fade-in grid grid-cols-1 lg:grid-cols-2 gap-6"},
    h("div",{className:"bg-white rounded-xl shadow p-6 border border-slate-200"},
      h("h3",{className:"font-bold text-lg text-slate-900 mb-6"},"Adjust Assumptions"),
      slider("Headcount",hc[0],hc[1],1,25,""),
      slider("Rate Change",rateAdj[0],rateAdj[1],-50,100,"%"),
      slider("Burn Adjustment",burnAdj[0],burnAdj[1],-50,100,"%")
    ),
    h("div",{className:"bg-white rounded-xl shadow p-6 border border-slate-200"},
      h("h3",{className:"font-bold text-lg text-slate-900 mb-6"},"Projected Impact"),
      h("div",{className:"space-y-4"},
        h("div",{className:"flex justify-between py-3 border-b border-slate-100"},
          h("span",{className:"text-slate-600"},"Monthly Team Cost"),
          h("span",{className:"font-bold text-xl"},fmtEGP(projected))),
        h("div",{className:"flex justify-between py-3 border-b border-slate-100"},
          h("span",{className:"text-slate-600"},"Annual Team Cost"),
          h("span",{className:"font-bold text-xl"},fmtEGP(annual))),
        h("div",{className:"flex justify-between py-3 border-b border-slate-100"},
          h("span",{className:"text-slate-600"},"FY26 Revenue"),
          h("span",{className:"font-bold text-xl"},fmtEGP(revenue))),
        h("div",{className:"flex justify-between py-3"},
          h("span",{className:"text-slate-600"},"Monthly Profit/Loss"),
          h("span",{className:"font-bold text-xl "+(profit>=0?"text-green-600":"text-red-600")},fmtEGP(profit)))
      )
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  var logged=useState(false);
  var tab=useState("dashboard");
  var data=useState(entries);
  var fx=useState(0);
  var fxLoading=useState(false);
  var syncMsg=useState("");

  // Fetch live FX rate on load
  useEffect(function(){
    fxLoading[1](true);
    fetch(FX_API).then(function(r){return r.json();}).then(function(j){
      if(j.rates&&j.rates.EGP)fx[1](j.rates.EGP);
      fxLoading[1](false);
    }).catch(function(){
      // Fallback
      fx[1](50.0);
      fxLoading[1](false);
    });
  },[]);

  var syncing=useRef(false);
  function syncVitalis(){
    if(syncing.current)return; // prevent double-click
    syncing.current=true;
    syncMsg[1]("Syncing...");
    fetch(VITALIS+"?days=90",{headers:{"x-api-key":VITALIS_KEY}})
    .then(function(r){return r.json();})
    .then(function(j){
      syncing.current=false;
      if(j.error){syncMsg[1]("Error: "+j.error);return;}
      // Deduplicate by creating a unique key per entry (user+date+duration)
      var seen={};
      var newEntries=(j.entries||[]).filter(function(e){
        var key=(e.user&&e.user.email||"")+"_"+e.logged_at+"_"+e.duration_minutes;
        if(seen[key])return false;
        seen[key]=true;
        return true;
      }).map(function(e,i){
        var d=new Date(e.logged_at||e.started_at);
        var hrs=Math.round(e.duration_minutes/60*100)/100;
        var rawName=e.user&&e.user.name||e.user&&e.user.email||"Unknown";
        // Name normalization: map Vitalis names to budget system names
        var nameMap={"Aml Hamdy":"Amal Hamdy","Aml":"Amal Hamdy","aml hamdy":"Amal Hamdy","Amal":"Amal Hamdy"};
        var nm=nameMap[rawName]||rawName;
        var mem=team.find(function(t){return t.name===nm||t.name.toLowerCase()===nm.toLowerCase();});
        var rate=mem?mem.rate:0;
        return {id:10000+i,y:d.getFullYear(),m:d.getMonth()+1,mn:MN[d.getMonth()+1],
          name:nm,type:mem?mem.type[0]:"H",rate:rate,hrs:hrs,
          amt:mem&&mem.salary>0?mem.salary:rate*hrs,st:"V",src:"vitalis"};
      });
      // Use functional setState to always get latest state — removes ALL old vitalis entries first
      data[1](function(prev){
        var manual=prev.filter(function(e){return e.src!=="vitalis";});
        return manual.concat(newEntries);
      });
      syncMsg[1](newEntries.length+" entries synced");
      setTimeout(function(){syncMsg[1]("");},5000);
    }).catch(function(err){syncing.current=false;syncMsg[1]("Failed: "+err.message);});
  }

  if(!logged[0])return h(Login,{onLogin:function(){logged[1](true);}});

  var tabs=["dashboard","payments","time-log","team","scenarios"];
  var tabLabels={"dashboard":"Dashboard","payments":"Payments","time-log":"Time Log","team":"Team","scenarios":"Scenarios"};

  return h("div",{className:"min-h-screen"},
    // Header
    h("div",{className:"bg-slate-900 text-white sticky top-0 z-50 shadow-lg"},
      h("div",{className:"max-w-7xl mx-auto px-4 py-4"},
        h("div",{className:"flex items-center justify-between mb-3"},
          h("div",null,
            h("h1",{className:"text-2xl font-bold"},"Rishca OS — Budget Manager"),
            h("div",{className:"text-slate-400 text-sm"},
              fxLoading[0]?"Loading FX rate...":fx[0]>0?"1 USD = "+fx[0].toFixed(2)+" EGP (live)":"FX rate unavailable"
            )
          ),
          h("div",{className:"flex items-center gap-3"},
            h("button",{onClick:syncVitalis,
              className:"bg-teal-700 hover:bg-teal-600 px-4 py-2 rounded-lg text-sm font-medium transition"},
              "⟳ Sync Vitalis"),
            syncMsg[0] && h("span",{className:"text-xs "+(syncMsg[0].indexOf("Error")>=0||syncMsg[0].indexOf("Failed")>=0?"text-red-400":"text-teal-300"),style:{maxWidth:"300px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block"}},syncMsg[0].length>80?syncMsg[0].substring(0,80)+"...":syncMsg[0]),
            h("button",{onClick:function(){logged[1](false);tab[1]("dashboard");},
              className:"bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm transition"},"Logout")
          )
        ),
        h("div",{className:"flex gap-1 border-t border-slate-700 pt-3 overflow-x-auto"},
          tabs.map(function(t){
            return h("button",{key:t,onClick:function(){tab[1](t);},
              className:"px-4 py-2 rounded-t-lg font-medium text-sm transition whitespace-nowrap "+
                (tab[0]===t?"bg-teal-600 text-white":"bg-slate-800 text-slate-300 hover:bg-slate-700")},
              tabLabels[t]);
          })
        )
      )
    ),
    // Content
    h("div",{className:"max-w-7xl mx-auto px-4 py-6"},
      tab[0]==="dashboard" && h(DashTab,{data:data[0],fx:fx[0]}),
      tab[0]==="payments" && h(PayTab,{data:data[0],setData:data[1],fx:fx[0]}),
      tab[0]==="time-log" && h(LogTab,{data:data[0],setData:data[1]}),
      tab[0]==="team" && h(TeamTab,{data:data[0]}),
      tab[0]==="scenarios" && h(ScenTab)
    )
  );
}

// ── RENDER ────────────────────────────────────────────────────
try{
  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
}catch(e){
  document.getElementById("root").innerHTML="<pre style='color:red;padding:40px'>"+e.message+"\\n"+e.stack+"</pre>";
}
</script>
</body>
</html>
