// Format EGP currency
const formatEGP = (value) => {
  if (typeof value !== 'number') return '0 EGP';
  return new Intl.NumberFormat('en-EG', {
    style: 'currency',
    currency: 'EGP',
    minimumFractionDigits: 0,
    maximumFractionDigits: 0,
  }).format(value);
};

// Main Dashboard Component
function RishcaBudgetDashboard() {
  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [password, setPassword] = useState('');
  const [currentTab, setCurrentTab] = useState('dashboard');
  const [timeEntries, setTimeEntries] = useState(initialTimeEntries);
  const [sortConfig, setSortConfig] = useState({ key: 'id', direction: 'asc' });
  const [filters, setFilters] = useState({ name: '', month: '', year: '', status: '' });
  const [showAddForm, setShowAddForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [scenarios, setScenarios] = useState({
    teamCost: 50000,
    monthlyBurn: 80000,
    headcount: 11,
    avgRate: 250,
  });

  // Vitalis-Layer sync state
  const [vitalisStatus, setVitalisStatus] = useState({ syncing: false, lastSync: null, count: 0, error: null });

  const syncFromVitalis = useCallback(async (days = 90) => {
    setVitalisStatus(prev => ({ ...prev, syncing: true, error: null }));
    try {
      const res = await fetch(`${VITALIS_API.url}?days=${days}`, {
        headers: { "x-api-key": VITALIS_API.key },
      });
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      // Convert Supabase time entries to our format
      const monthNames = ["", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const newEntries = (data.entries || []).map((e, idx) => {
        const logDate = new Date(e.logged_at || e.started_at);
        const month = logDate.getMonth() + 1;
        const year = logDate.getFullYear();
        const hours = Math.round((e.duration_minutes / 60) * 100) / 100;
        const userName = VITALIS_NAME_MAP[e.user?.name] || e.user?.name || e.user?.email || "Unknown";
        const member = teamRoster.find(m => m.name === userName);
        const rate = member?.rate || 0;
        return {
          id: 10000 + idx,
          year,
          month,
          monthName: monthNames[month] || "?",
          name: userName,
          type: member?.type || "Hourly",
          rate,
          hours,
          amount: member?.type === "Fulltime" ? (member?.salary || 0) : rate * hours,
          status: "Vitalis",
          source: "vitalis",
          task: e.task?.title || "",
          project: e.task?.project_name || "",
        };
      });

      // Merge: keep existing entries, add new Vitalis entries (replace previous Vitalis imports)
      setTimeEntries(prev => {
        const manual = prev.filter(e => e.source !== "vitalis");
        return [...manual, ...newEntries];
      });

      setVitalisStatus({
        syncing: false,
        lastSync: new Date().toLocaleTimeString(),
        count: newEntries.length,
        error: null,
      });
    } catch (err) {
      setVitalisStatus(prev => ({ ...prev, syncing: false, error: err.message }));
    }
  }, []);

  const handleLogin = (e) => {
    e.preventDefault();
    if (password === 'rishca2026') {
      setIsAuthenticated(true);
      setPassword('');
    } else {
      alert('Invalid password');
    }
  };

  const handleLogout = () => {
    setIsAuthenticated(false);
    setPassword('');
    setCurrentTab('dashboard');
  };

  // Sorting functionality
  const handleSort = (key) => {
    let direction = 'asc';
    if (sortConfig.key === key && sortConfig.direction === 'asc') {
      direction = 'desc';
    }
    setSortConfig({ key, direction });
  };

  // Apply filters and sorting
  const getFilteredAndSortedEntries = () => {
    let filtered = timeEntries.filter(entry => {
      if (filters.name && entry.name !== filters.name) return false;
      if (filters.month && entry.month !== parseInt(filters.month)) return false;
      if (filters.year && entry.year !== parseInt(filters.year)) return false;
      if (filters.status && entry.status !== filters.status) return false;
      return true;
    });

    filtered.sort((a, b) => {
      const aValue = a[sortConfig.key];
      const bValue = b[sortConfig.key];
      if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
      if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
      return 0;
    });

    return filtered;
  };

  // Add new entry
  const handleAddEntry = (newEntry) => {
    const id = Math.max(...timeEntries.map(e => e.id), 0) + 1;
    setTimeEntries([...timeEntries, { ...newEntry, id }]);
    setShowAddForm(false);
  };

  // Edit entry
  const handleEditEntry = (id, field, value) => {
    const updated = timeEntries.map(entry => {
      if (entry.id === id) {
        const updated = { ...entry, [field]: value };
        // Auto-calculate amount if hours or rate changed
        if ((field === 'hours' || field === 'rate') && entry.rate && entry.hours) {
          updated.amount = updated.hours * updated.rate;
        }
        return updated;
      }
      return entry;
    });
    setTimeEntries(updated);
  };

  // Delete entry
  const handleDeleteEntry = (id) => {
    setTimeEntries(timeEntries.filter(e => e.id !== id));
  };

  // Calculate KPIs
  const calculateKPIs = () => {
    const currentMonth = new Date().getMonth() + 1;
    const currentYear = new Date().getFullYear();

    const thisMonth = timeEntries
      .filter(e => e.year === currentYear && e.month === currentMonth)
      .reduce((sum, e) => sum + e.amount, 0);

    const allTime = timeEntries.reduce((sum, e) => sum + e.amount, 0);

    const uniqueMembers = new Set(timeEntries.map(e => e.name)).size;

    const monthlyAvg = allTime / 12; // Approximate

    return { thisMonth, allTime, uniqueMembers, monthlyAvg };
  };

  // Monthly data for chart
  const getMonthlyData = () => {
    const months = ['Mar 25', 'Apr 25', 'May 25', 'Jun 25', 'Jul 25', 'Aug 25', 'Sep 25', 'Oct 25', 'Nov 25', 'Dec 25', 'Jan 26', 'Feb 26'];
    const data = [];

    for (let i = 0; i < 12; i++) {
      const monthIndex = i + 3; // Start from March
      const year = monthIndex > 12 ? 2026 : 2025;
      const month = monthIndex > 12 ? monthIndex - 12 : monthIndex;

      const total = timeEntries
        .filter(e => e.year === year && e.month === month)
        .reduce((sum, e) => sum + e.amount, 0);

      data.push({ month: months[i], amount: total });
    }

    return data;
  };

  // Spending by team member
  const getSpendByMember = () => {
    const memberSpend = {};
    timeEntries.forEach(entry => {
      if (!memberSpend[entry.name]) {
        memberSpend[entry.name] = 0;
      }
      memberSpend[entry.name] += entry.amount;
    });

    return Object.entries(memberSpend)
      .map(([name, amount]) => ({ name, amount }))
      .sort((a, b) => b.amount - a.amount)
      .slice(0, 10);
  };

  if (!isAuthenticated) {
    return (

                <div>
                  <p className="text-slate-600 text-sm mb-1">Total Monthly Payroll</p>
                  <p className="text-3xl font-bold text-slate-900">{formatEGP(6000 + 12000 + 30000)}</p>

                <div>
                  <p className="text-slate-600 text-sm mb-1">Salaried Employees</p>
                  <p className="text-3xl font-bold text-slate-900">3</p>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* SCENARIOS TAB */}
        {currentTab === 'scenarios' && (
          <div>
            <h1 className="text-2xl font-bold text-slate-900 mb-6">Financial Scenarios</h1>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              {/* Inputs */}
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-lg font-bold text-slate-900 mb-6">Model Assumptions</h2>

                <div className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-2">

                    <input
                      type="range"
                      min="10000"
                      max="150000"
                      step="1000"
                      value={scenarios.teamCost}
                      onChange={(e) => setScenarios({ ...scenarios, teamCost: parseInt(e.target.value) })}

                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-2">
                      Monthly Burn Rate: {formatEGP(scenarios.monthlyBurn)}
                    </label>
                    <input
                      type="range"
                      min="20000"
                      max="200000"
                      step="5000"
                      value={scenarios.monthlyBurn}
                      onChange={(e) => setScenarios({ ...scenarios, monthlyBurn: parseInt(e.target.value) })}
                      className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-2">
                      Headcount: {scenarios.headcount}
                    </label>
                    <input
                      type="range"
                      min="1"
                      max="30"
                      step="1"
                      value={scenarios.headcount}
                      onChange={(e) => setScenarios({ ...scenarios, headcount: parseInt(e.target.value) })}
                      className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-2">

                    </label>
                    <input
                      type="range"
                      min="50"
                      max="1000"
                      step="10"
                      value={scenarios.avgRate}
                      onChange={(e) => setScenarios({ ...scenarios, avgRate: parseInt(e.target.value) })}
                      className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                    />
                  </div>
                </div>
              </div>

              {/* Projections */}
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-lg font-bold text-slate-900 mb-6">Projected P&L Impact</h2>

                <div className="space-y-4">
                  <div className="p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <p className="text-sm text-slate-600 mb-1">Team Cost (Monthly)</p>
                    <p className="text-2xl font-bold text-slate-900">{formatEGP(scenarios.teamCost)}</p>
                  </div>

                  <div className="p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <p className="text-sm text-slate-600 mb-1">Monthly Burn Rate</p>
                    <p className="text-2xl font-bold text-slate-900">{formatEGP(scenarios.monthlyBurn)}</p>
                  </div>

                  <div className="p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <p className="text-sm text-slate-600 mb-1">Net Monthly Impact (Team)</p>
                    <p className={`text-2xl font-bold ${scenarios.monthlyBurn - scenarios.teamCost > 0 ? 'text-green-600' : 'text-red-600'}`}>
                      {formatEGP(scenarios.monthlyBurn - scenarios.teamCost)}
                    </p>
                  </div>

                  <div className="p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <p className="text-sm text-slate-600 mb-1">Annual Team Cost</p>
                    <p className="text-2xl font-bold text-slate-900">{formatEGP(scenarios.teamCost * 12)}</p>
                  </div>

                  <div className="p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <p className="text-sm text-blue-600 mb-1">Avg Cost Per Person</p>

                  <div className="p-4 bg-teal-50 rounded-lg border border-teal-200">
                    <p className="text-sm text-teal-600 mb-1">Runway (months)</p>
                    <p className="text-2xl font-bold text-teal-900">

                        : (Math.abs(scenarios.monthlyBurn - scenarios.teamCost) > 0
                          ? Math.floor(500000 / Math.abs(scenarios.monthlyBurn - scenarios.teamCost))
                          : 'N/A'))}
                    </p>
                  </div>
                </div>
              </div>
            </div>

            {/* Scenario Table */}
            <div className="mt-8 bg-white rounded-lg shadow overflow-hidden">
              <div className="p-6 border-b border-slate-200">
                <h3 className="text-lg font-bold text-slate-900">What-If Scenarios</h3>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-slate-100 border-b border-slate-300">
                    <tr>
                      <th className="px-4 py-3 text-left font-semibold text-slate-900">Scenario</th>
                      <th className="px-4 py-3 text-right font-semibold text-slate-900">Team Cost</th>
                      <th className="px-4 py-3 text-right font-semibold text-slate-900">Headcount</th>
                      <th className="px-4 py-3 text-right font-semibold text-slate-900">Avg Cost/Person</th>
                      <th className="px-4 py-3 text-right font-semibold text-slate-900">Impact</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr className="bg-white border-b border-slate-200">
                      <td className="px-4 py-3 font-semibold text-slate-900">Current</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP(scenarios.teamCost)}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{scenarios.headcount}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP(scenarios.teamCost / scenarios.headcount)}</td>
                      <td className="px-4 py-3 text-right font-semibold">Baseline</td>
                    </tr>
                    <tr className="bg-green-50">
                      <td className="px-4 py-3 font-semibold text-slate-900">-1 Headcount</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP(scenarios.teamCost * (scenarios.headcount - 1) / scenarios.headcount)}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{scenarios.headcount - 1}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP(scenarios.teamCost / scenarios.headcount)}</td>
                      <td className="px-4 py-3 text-right font-semibold text-green-600">Save {formatEGP(scenarios.teamCost / scenarios.headcount)}</td>
                    </tr>
                    <tr className="bg-red-50">
                      <td className="px-4 py-3 font-semibold text-slate-900">+1 Headcount</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP(scenarios.teamCost * (scenarios.headcount + 1) / scenarios.headcount)}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{scenarios.headcount + 1}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP(scenarios.teamCost / scenarios.headcount)}</td>
                      <td className="px-4 py-3 text-right font-semibold text-red-600">Add {formatEGP(scenarios.teamCost / scenarios.headcount)}</td>
                    </tr>
                    <tr className="bg-orange-50">
                      <td className="px-4 py-3 font-semibold text-slate-900">+10% Rates</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP(scenarios.teamCost * 1.1)}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{scenarios.headcount}</td>
                      <td className="px-4 py-3 text-right text-slate-900">{formatEGP((scenarios.teamCost * 1.1) / scenarios.headcount)}</td>
                      <td className="px-4 py-3 text-right font-semibold text-orange-600">Add {formatEGP(scenarios.teamCost * 0.1)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Add Entry Form Component
function AddEntryForm({ onAdd, onCancel }) {
  const [formData, setFormData] = useState({
    year: 2026,
    month: 2,
    monthName: 'Feb',
    name: '',
    type: 'Hourly',
    rate: 0,
    hours: 0,
    amount: 0,
    status: 'Open',
  });

  const handleChange = (field, value) => {
    const updated = { ...formData, [field]: value };

    // Auto-calculate amount
    if ((field === 'hours' || field === 'rate') && updated.rate && updated.hours) {
      updated.amount = updated.hours * updated.rate;
    }

    setFormData(updated);
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!formData.name) {
      alert('Please enter a name');
      return;
    }
    onAdd(formData);
    setFormData({
      year: 2026,
      month: 2,
      monthName: 'Feb',
      name: '',
      type: 'Hourly',
      rate: 0,
      hours: 0,
      amount: 0,
      status: 'Open',
    });
  };

  const monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  return (
    <form onSubmit={handleSubmit}>
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Year</label>
          <input
            type="number"
            value={formData.year}
            onChange={(e) => handleChange('year', parseInt(e.target.value))}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500"
          />
        </div>
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Month</label>
          <select
            value={formData.month}
            onChange={(e) => {
              const m = parseInt(e.target.value);
              handleChange('month', m);
              handleChange('monthName', monthNames[m]);
            }}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500"
          >
            {monthNames.map((name, idx) => idx > 0 && <option key={idx} value={idx}>{name}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Name</label>
          <input
            type="text"
            value={formData.name}
            onChange={(e) => handleChange('name', e.target.value)}
            placeholder="Team member name"
            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500"
          />
        </div>
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Type</label>
          <select
            value={formData.type}
            onChange={(e) => handleChange('type', e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500"
          >
            <option>Hourly</option>
            <option>Fulltime</option>
            <option>Part-time + Hourly</option>
          </select>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Rate (EGP)</label>
          <input
            type="number"
            value={formData.rate}
            onChange={(e) => handleChange('rate', parseFloat(e.target.value) || 0)}
            placeholder="0"
            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500"
          />
        </div>
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Hours</label>
          <input
            type="number"
            step="0.25"
            value={formData.hours}
            onChange={(e) => handleChange('hours', parseFloat(e.target.value) || 0)}
            placeholder="0"
            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500"
          />
        </div>
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Amount (Auto)</label>
          <input
            type="number"
            value={formData.amount}
            disabled
            className="w-full px-3 py-2 border border-slate-300 rounded-lg bg-slate-100"
          />
        </div>
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Status</label>
          <select
            value={formData.status}
            onChange={(e) => handleChange('status', e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500"
          >
            <option>Open</option>
            <option>Transferred</option>
          </select>
        </div>
      </div>

      <div className="flex gap-2">
        <button
          type="submit"
          className="bg-teal-600 hover:bg-teal-700 text-white font-semibold px-4 py-2 rounded-lg transition"
        >
          Add Entry
        </button>
        <button
          type="button"
          onClick={onCancel}
          className="bg-slate-300 hover:bg-slate-400 text-slate-900 font-semibold px-4 py-2 rounded-lg transition"
        >
          Cancel
        </button>
      </div>
    </form>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RishcaBudgetDashboard));
  </script>
