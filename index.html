        function formatEGP(value) {
            return new Intl.NumberFormat('en-EG', {
                style: 'currency',
                currency: 'EGP',
                minimumFractionDigits: 0
            }).format(value);
        }

         * @returns {object} Statistics including total amount and count
         */
        function getPeriodStats(data, year, month = null) {
            const filtered = data.filter(e => e.year === year && (!month || e.month === month));
            return {
                total: filtered.reduce((sum, e) => sum + e.amount, 0),
                count: filtered.length,
                entries: filtered
            };
        }

         * @param {array} data - Source array
         * @param {string} key - Key to extract

        function getUnique(data, key) {
            return [...new Set(data.map(e => e[key]))].sort();

                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                }
            }, []);

            return h('div', null,
                h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6' },
                    h('div', { className: 'kpi-card' },
                        h('div', { className: 'text-sm text-slate-600 mb-1' }, 'This Month'),
                        h('div', { className: 'text-3xl font-bold text-slate-900' }, formatEGP(thisMonthAmount))
                    ),
                    h('div', { className: 'kpi-card' },
                        h('div', { className: 'text-sm text-slate-600 mb-1' }, 'All Time'),
                        h('div', { className: 'text-3xl font-bold text-slate-900' }, formatEGP(allTimeAmount))
                    ),
                    h('div', { className: 'kpi-card' },
                        h('div', { className: 'text-sm text-slate-600 mb-1' }, 'Active Members'),
                        h('div', { className: 'text-3xl font-bold text-teal-600' }, activeMembers)
                    ),
                    h('div', { className: 'kpi-card' },
                        h('div', { className: 'text-sm text-slate-600 mb-1' }, 'Avg Monthly Burn'),
                        h('div', { className: 'text-3xl font-bold text-slate-900' }, formatEGP(avgMonthlyBurn))
                    )
                ),
                h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                    h('div', { className: 'chart-container' },
                        h('h3', { className: 'text-lg font-bold text-slate-900 mb-4' }, 'Monthly Spend Trend'),
                        h('canvas', { id: 'monthlyChart', height: '300' })
                    ),
                    h('div', { className: 'chart-container' },
                        h('h3', { className: 'text-lg font-bold text-slate-900 mb-4' }, 'Top Earners'),
                        h('canvas', { id: 'personChart', height: '300' })

        // ============================================================
        // TIME LOG TAB COMPONENT
        // ============================================================
        /**
         * TimeLogTab - Complete time entry log with filtering and sorting
         * Supports filtering by name, month, year, and status
         * Supports sorting by any column with ascending/descending toggle
         */
        function TimeLogTab() {
            const [filteredEntries, setFilteredEntries] = useState(entries);
            const [nameFilter, setNameFilter] = useState('');
            const [monthFilter, setMonthFilter] = useState('');
            const [yearFilter, setYearFilter] = useState('');
            const [statusFilter, setStatusFilter] = useState('');
            const [sortKey, setSortKey] = useState('id');
            const [sortAsc, setSortAsc] = useState(true);

            useEffect(() => {
                let result = entries.filter(e => {
                    if (nameFilter && !e.name.includes(nameFilter)) return false;
                    if (monthFilter && e.month !== parseInt(monthFilter)) return false;
                    if (yearFilter && e.year !== parseInt(yearFilter)) return false;
                    if (statusFilter && e.status !== statusFilter) return false;
                    return true;
                });

                result.sort((a, b) => {
                    let aVal = a[sortKey];
                    let bVal = b[sortKey];
                    if (aVal < bVal) return sortAsc ? -1 : 1;
                    if (aVal > bVal) return sortAsc ? 1 : -1;
                    return 0;
                });

                setFilteredEntries(result);
            }, [nameFilter, monthFilter, yearFilter, statusFilter, sortKey, sortAsc]);

            const handleSort = (key) => {
                if (sortKey === key) {
                    setSortAsc(!sortAsc);
                } else {
                    setSortKey(key);
                    setSortAsc(true);
                }
            };

            const uniqueNames = [...new Set(entries.map(e => e.name))].sort();
            const uniqueMonths = [...new Set(entries.map(e => e.month))].sort((a, b) => a - b);
            const uniqueYears = [...new Set(entries.map(e => e.year))].sort((a, b) => b - a);

            return h('div', null,
                h('h2', { className: 'text-2xl font-bold text-slate-900 mb-6' }, 'Time Log - All Entries'),
                h('div', { className: 'bg-white rounded-lg shadow overflow-x-auto mb-6' },
                    h('div', { className: 'flex gap-4 p-4 border-b flex-wrap' },
                        h('select', {
                            value: nameFilter,
                            onChange: (e) => setNameFilter(e.target.value),
                            className: 'px-3 py-2 border border-slate-300 rounded text-sm'
                        },
                            h('option', { value: '' }, 'All Names'),
                            uniqueNames.map(n => h('option', { key: n, value: n }, n))
                        ),
                        h('select', {
                            value: monthFilter,
                            onChange: (e) => setMonthFilter(e.target.value),
                            className: 'px-3 py-2 border border-slate-300 rounded text-sm'
                        },
                            h('option', { value: '' }, 'All Months'),
                            uniqueMonths.map(m => h('option', { key: m, value: m }, ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]))
                        ),
                        h('select', {
                            value: yearFilter,
                            onChange: (e) => setYearFilter(e.target.value),
                            className: 'px-3 py-2 border border-slate-300 rounded text-sm'
                        },
                            h('option', { value: '' }, 'All Years'),
                            uniqueYears.map(y => h('option', { key: y, value: y }, y))
                        ),
                        h('select', {
                            value: statusFilter,
                            onChange: (e) => setStatusFilter(e.target.value),
                            className: 'px-3 py-2 border border-slate-300 rounded text-sm'
                        },
                            h('option', { value: '' }, 'All Status'),
                            h('option', { value: 'Transferred' }, 'Transferred'),
                            h('option', { value: 'Open' }, 'Open')
                        )
                    ),
                    h('div', { style: { overflowX: 'auto' } },
                        h('table', null,
                            h('thead', null,
                                h('tr', null,
                                    h('th', { onClick: () => handleSort('id'), style: { minWidth: '50px' } }, 'ID ' + (sortKey === 'id' ? (sortAsc ? '↑' : '↓') : '')),
                                    h('th', { onClick: () => handleSort('name'), style: { minWidth: '150px' } }, 'Name ' + (sortKey === 'name' ? (sortAsc ? '↑' : '↓') : '')),
                                    h('th', { onClick: () => handleSort('mn'), style: { minWidth: '90px' } }, 'Month ' + (sortKey === 'mn' ? (sortAsc ? '↑' : '↓') : '')),
                                    h('th', { onClick: () => handleSort('type'), style: { minWidth: '90px' } }, 'Type ' + (sortKey === 'type' ? (sortAsc ? '↑' : '↓') : '')),
                                    h('th', { onClick: () => handleSort('rate'), style: { minWidth: '100px' } }, 'Rate ' + (sortKey === 'rate' ? (sortAsc ? '↑' : '↓') : '')),
                                    h('th', { onClick: () => handleSort('hours'), style: { minWidth: '80px' } }, 'Hours ' + (sortKey === 'hours' ? (sortAsc ? '↑' : '↓') : '')),
                                    h('th', { onClick: () => handleSort('amount'), style: { minWidth: '120px' } }, 'Amount ' + (sortKey === 'amount' ? (sortAsc ? '↑' : '↓') : '')),
                                    h('th', { onClick: () => handleSort('status'), style: { minWidth: '100px' } }, 'Status ' + (sortKey === 'status' ? (sortAsc ? '↑' : '↓') : ''))
                                )
                            ),
                            h('tbody', null,
                                filteredEntries.map(e => h('tr', { key: e.id },
                                    h('td', null, e.id),
                                    h('td', null, e.name),
                                    h('td', null, e.mn + ' ' + e.year),
                                    h('td', null, e.type),
                                    h('td', null, e.rate ? formatEGP(e.rate) : '—'),
                                    h('td', null, e.hours ? e.hours.toFixed(2) : '—'),
                                    h('td', null, formatEGP(e.amount)),
                                    h('td', null,
                                        h('span', {
                                            className: e.status === 'Transferred' ? 'status-transferred px-3 py-1 rounded text-sm font-bold' : 'status-open px-3 py-1 rounded text-sm font-bold'
                                        }, e.status)
                                    )
                                ))
                            )
                        )
                    )
                ),
                h('div', { className: 'text-right text-slate-600' }, 'Showing ' + filteredEntries.length + ' of ' + entries.length + ' entries')
            );
        }

        // ============================================================
        // TEAM TAB COMPONENT
        // ============================================================
        /**
         * TeamTab - Team member directory with stats
         * Displays all team members with their rates, tenure, and earned totals
         */
        function TeamTab() {
            /**
             * Calculate person statistics
             * @param {string} name - Team member name
             * @returns {object} Total hours and total earned
             */
            const getPersonStats = (name) => {
                const personEntries = entries.filter(e => e.name === name);
                const totalHours = personEntries.reduce((sum, e) => sum + (e.hours || 0), 0);
                const totalEarned = personEntries.reduce((sum, e) => sum + e.amount, 0);
                return { totalHours, totalEarned };
            };

            return h('div', null,
                h('h2', { className: 'text-2xl font-bold text-slate-900 mb-6' }, 'Team Members'),
                h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
                    team.map(member => {
                        const stats = getPersonStats(member.name);
                        return h('div', { key: member.name, className: 'bg-white rounded-lg shadow p-6' },
                            h('div', { className: 'flex justify-between items-start mb-4' },
                                h('div', null,
                                    h('h3', { className: 'text-lg font-bold text-slate-900' }, member.name),
                                    h('p', { className: 'text-sm text-slate-600 mt-1' }, member.type)
                                ),
                                h('span', { className: member.active ? 'badge-active' : 'badge-inactive' }, member.active ? 'Active' : 'Inactive')
                            ),
                            h('div', { className: 'space-y-2 mb-4' },
                                h('p', { className: 'text-sm text-slate-600' }, h('span', { className: 'font-semibold' }, 'Type: '), member.type),
                                member.rate && h('p', { className: 'text-sm text-slate-600' }, h('span', { className: 'font-semibold' }, 'Rate: '), formatEGP(member.rate) + '/hr'),
                                member.salary && h('p', { className: 'text-sm text-slate-600' }, h('span', { className: 'font-semibold' }, 'Salary: '), formatEGP(member.salary) + '/mo'),
                                h('p', { className: 'text-sm text-slate-600' }, h('span', { className: 'font-semibold' }, 'Tenure: '), member.start + (member.end ? ' to ' + member.end : ' - Present'))
                            ),
                            h('div', { className: 'border-t border-slate-200 pt-4' },
                                h('p', { className: 'text-sm text-slate-600 mb-1' }, h('span', { className: 'font-semibold' }, 'Total Hours: '), stats.totalHours.toFixed(2)),
                                h('p', { className: 'text-lg font-bold text-teal-600' }, formatEGP(stats.totalEarned))
                            )
                        );
                    })
                )
            );
        }

        // ============================================================
        // SALARIES TAB COMPONENT
        // ============================================================
        /**
         * SalariesTab - Salaried employee payment tracking
         * Compares expected salary vs actual payments
         */
        function SalariesTab() {
            const salariesData = [
                { name: 'Amal Hamdy', salary: 6000 },
                { name: 'Anas Emad', salary: 12000 },
                { name: 'Bahaa Mohamed', salary: 30000 }
            ];

            const months = [
                { name: 'Jan', year: 2026, month: 1 },
                { name: 'Feb', year: 2026, month: 2 },
            ];

            /**
             * Get monthly payments for an employee
             * @param {string} name - Employee name
             * @param {number} year - Year
             * @param {number} month - Month
             * @returns {number} Total payments received
             */
            const getMonthlyPaid = (name, year, month) => {
                return entries
                    .filter(e => e.name === name && e.year === year && e.month === month)
                    .reduce((sum, e) => sum + e.amount, 0);
            };

            return h('div', null,
                h('h2', { className: 'text-2xl font-bold text-slate-900 mb-6' }, 'Salaried Employees'),
                h('div', { className: 'bg-white rounded-lg shadow overflow-x-auto' },
                    h('table', null,
                        h('thead', null,
                            h('tr', null,
                                h('th', null, 'Name'),
                                h('th', null, 'Monthly Salary'),
                                months.map(m => h('th', { key: m.name }, m.name + ' 26'))
                            )
                        ),
                        h('tbody', null,
                            salariesData.map(emp => h('tr', { key: emp.name },
                                h('td', null, emp.name),
                                h('td', null, formatEGP(emp.salary)),
                                months.map(m => {
                                    const paid = getMonthlyPaid(emp.name, m.year, m.month);
                                    return h('td', { key: m.name },
                                        h('div', null,
                                            h('span', { className: paid >= emp.salary ? 'status-transferred px-2 py-1 rounded text-xs' : 'status-open px-2 py-1 rounded text-xs' }, formatEGP(paid)),
                                            h('p', { className: 'text-xs text-slate-600 mt-1' }, 'vs ' + formatEGP(emp.salary))
                                        )
                                    );
                                })
                            ))
                        )
                    )
                )
            );
        }

        // ============================================================
        // SCENARIOS TAB COMPONENT
        // ============================================================
        /**
         * ScenariosTab - Interactive financial scenarios
         * Allows adjustment of parameters to model different scenarios
         * Calculates projected costs, revenue, and profit margins
         */
        function ScenariosTab() {
            const [headcount, setHeadcount] = useState(11);
            const [rateChange, setRateChange] = useState(0);
            const [burnAdjust, setBurnAdjust] = useState(0);

            // Calculate base monthly from February 2026 actuals
            const currentMonthAmount = entries
                .filter(e => e.year === 2026 && e.month === 2)
                .reduce((sum, e) => sum + e.amount, 0);

            const baseMonthly = currentMonthAmount;
            const projectedMonthly = baseMonthly * (1 + rateChange / 100) * (1 + burnAdjust / 100);
            const projectedAnnual = projectedMonthly * 12;

            // Financial metrics
            const fy26Revenue = 49000;
            const currentProfit = fy26Revenue - projectedAnnual;
            const profitMargin = ((currentProfit / fy26Revenue) * 100).toFixed(1);

            return h('div', null,
                h('h2', { className: 'text-2xl font-bold text-slate-900 mb-6' }, 'Financial Scenarios'),
                h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                    h('div', { className: 'bg-white rounded-lg shadow p-6' },
                        h('h3', { className: 'text-lg font-bold mb-6' }, 'Adjust Parameters'),
                        h('div', { className: 'space-y-6' },
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold mb-2' }, 'Headcount: ' + headcount),
                                h('input', { type: 'range', min: '5', max: '20', value: headcount, onChange: (e) => setHeadcount(parseInt(e.target.value)), className: 'w-full' })
                            ),
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold mb-2' }, 'Avg Rate Change: ' + rateChange + '%'),
                                h('input', { type: 'range', min: '-50', max: '50', value: rateChange, onChange: (e) => setRateChange(parseInt(e.target.value)), className: 'w-full' })
                            ),
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold mb-2' }, 'Monthly Burn Adjustment: ' + burnAdjust + '%'),
                                h('input', { type: 'range', min: '-50', max: '50', value: burnAdjust, onChange: (e) => setBurnAdjust(parseInt(e.target.value)), className: 'w-full' })
                            )
                        )
                    ),
                    h('div', { className: 'space-y-4' },
                        h('div', { className: 'kpi-card' },
                            h('div', { className: 'text-sm text-slate-600 mb-1' }, 'Projected Monthly Cost'),
                            h('div', { className: 'text-3xl font-bold text-slate-900' }, formatEGP(projectedMonthly))
                        ),
                        h('div', { className: 'kpi-card' },
                            h('div', { className: 'text-sm text-slate-600 mb-1' }, 'Projected Annual Cost'),
                            h('div', { className: 'text-3xl font-bold text-slate-900' }, formatEGP(projectedAnnual))
                        ),
                        h('div', { className: 'kpi-card' },
                            h('div', { className: 'text-sm text-slate-600 mb-1' }, 'FY26 Revenue'),
                            h('div', { className: 'text-3xl font-bold text-slate-900' }, formatEGP(fy26Revenue))
                        ),
                        h('div', { className: 'kpi-card ' + (currentProfit > 0 ? 'border-l-4 border-green-500' : 'border-l-4 border-red-500') },
                            h('div', { className: 'text-sm text-slate-600 mb-1' }, 'Est. Annual Profit'),
                            h('div', { className: 'text-3xl font-bold ' + (currentProfit > 0 ? 'text-green-600' : 'text-red-600') }, formatEGP(currentProfit)),
                            h('div', { className: 'text-sm text-slate-600 mt-2' }, 'Margin: ' + profitMargin + '%')
                        )
                    )
                )
            );
        }

        // ============================================================
        // MAIN APP COMPONENT
        // ============================================================
        /**
         * App - Main application component
         * Manages authentication state, tab navigation, and layout
         * Includes header with Vitalis sync and logout buttons
         */
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [syncStatus, setSyncStatus] = useState('');

            if (!isLoggedIn) {
                return h(LoginScreen, { onLogin: () => setIsLoggedIn(true) });
            }

            /**
             * Handle Vitalis API data synchronization
             * Sends sync request to backend
             */
            const handleSync = async () => {
                setSyncStatus('Syncing...');
                try {
                    const response = await fetch(VITALIS_API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${VITALIS_KEY}`
                        },
                        body: JSON.stringify({ action: 'sync' })
                    });

                    if (response.ok) {
                        setSyncStatus('Data synced successfully');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else {
                        setSyncStatus('Sync failed with status: ' + response.status);
                    }
                } catch (err) {
                    setSyncStatus('Sync failed: ' + err.message);
                }
            };

            return h('div', { className: 'min-h-screen bg-gray-50' },
                h('div', { className: 'bg-slate-900 text-white shadow-lg' },
                    h('div', { className: 'max-w-7xl mx-auto px-4 py-4' },
                        h('div', { className: 'flex justify-between items-center mb-6' },
                            h('h1', { className: 'text-2xl font-bold' }, 'RISHCA OS'),
                            h('div', { className: 'flex gap-4' },
                                h('button', { onClick: handleSync, className: 'bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition' }, 'Sync Vitalis'),
                                h('button', { onClick: () => setIsLoggedIn(false), className: 'bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded-lg text-sm transition' }, 'Logout')
                            )
                        ),
                        h('div', { className: 'flex gap-6 border-b border-slate-700 flex-wrap' },
                            ['dashboard', 'time-log', 'team', 'salaries', 'scenarios'].map(tab => {
                                const labels = { 'dashboard': 'Dashboard', 'time-log': 'Time Log', 'team': 'Team', 'salaries': 'Salaries', 'scenarios': 'Scenarios' };
                                return h('button', { key: tab, onClick: () => setActiveTab(tab), className: 'py-3 px-4 font-semibold text-sm transition ' + (activeTab === tab ? 'border-b-3 border-teal-500 text-teal-400' : 'text-slate-300 hover:text-white') }, labels[tab]);
                            })
                        )
                    )
                ),
                h('div', { className: 'max-w-7xl mx-auto px-4 py-8' },
                    activeTab === 'dashboard' && h(DashboardTab),
                    activeTab === 'time-log' && h(TimeLogTab),
                    activeTab === 'team' && h(TeamTab),
                    activeTab === 'salaries' && h(SalariesTab),
                    activeTab === 'scenarios' && h(ScenariosTab)
                )
            );
        }

        // ============================================================
        // APPLICATION INITIALIZATION
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));

        // ============================================================
        // RISHCA OS BUDGET DASHBOARD - END OF APPLICATION
        // ============================================================
        // Features:
        // - Password-protected access (rishca2026)
        // - 5 functional tabs: Dashboard, Time Log, Team, Salaries, Scenarios
        // - 70 embedded time entries with complete data
        // - 11 team members with employment details
        // - Interactive charts using Chart.js
        // - Real-time filtering and sorting
        // - Financial scenario modeling
        // - Vitalis API integration for data sync
        // - Professional dark theme with teal accents
        // - Responsive design for mobile and desktop
        // - Currency formatting for Egyptian Pounds (EGP)
        //
        // Browser Requirements:
        // - Modern browser with ES6 support
        // - JavaScript enabled
        // - Works offline (no external data persistence)
        //
        // Data:
        // - All 70 time entries embedded inline
        // - Time range: March 2025 - February 2026
        // - Team size: 11 members (hourly, part-time, full-time)
        // - Monthly burn totals tracked
        // - Salary expectations vs actual payments tracked
        //
        // Login Credentials:
        // - Password: rishca2026
        //
        // Support:
        // - Check browser console for debug information
        // - Vitalis API endpoint: https://llrvrcgwhvcaqvscpnsi.supabase.co/functions/v1/team-time-log
        // ============================================================
    </script>
</body>
